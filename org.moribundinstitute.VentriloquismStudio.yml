app-id: org.moribundinstitute.VentriloquismStudio
runtime: org.gnome.Platform
runtime-version: '47'
sdk: org.gnome.Sdk
sdk-extensions:
  - org.freedesktop.Sdk.Extension.rust-stable
  - org.freedesktop.Sdk.Extension.node20
command: ventriloquism-studio
finish-args:
  - --share=ipc
  - --socket=fallback-x11
  - --socket=wayland
  - --device=dri
  - --share=network
  - --filesystem=xdg-run/pipewire-0:ro
  - --filesystem=home:rw

modules:
  - name: ventriloquism-studio
    buildsystem: simple
    build-options:
      append-path: /usr/lib/sdk/node20/bin:/usr/lib/sdk/rust-stable/bin
      env:
        CARGO_HOME: /run/build/ventriloquism-studio/cargo
      build-args:
        - --share=network
    sources:
      - type: dir
        path: .
    build-commands:
      - npm install
      - npm run tauri build -- --bundles deb
      # FIX: Source binary is 'ventriloquism', target is 'ventriloquism-studio'
      - install -D src-tauri/target/release/ventriloquism /app/bin/ventriloquism-studio
      - install -D deploy/org.moribundinstitute.VentriloquismStudio.desktop /app/share/applications/org.moribundinstitute.VentriloquismStudio.desktop
      # Ensure this path matches the actual icon generated by the Tauri icon tool
      - install -D src-tauri/icons/128x128.png /app/share/icons/hicolor/128x128/apps/org.moribundinstitute.VentriloquismStudio.png